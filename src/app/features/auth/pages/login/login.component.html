<section class="login-page" aria-labelledby="login-title">
  <mat-card class="login-card">
    <div class="login-card__icon" aria-hidden="true">
      <mat-icon>lock</mat-icon>
    </div>

    <div class="login-card__header">
      <h1 id="login-title" class="login-card__title">Iniciar sesion</h1>
      <p class="login-card__subtitle">Ingrese sus credenciales para continuar</p>
    </div>

    <form
      class="login-form"
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      novalidate
    >
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          autocomplete="email"
          aria-label="Email"
        />
        <mat-error *ngIf="shouldShowError(emailControl)">
          {{ getEmailErrorMessage() }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contrasena</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
          aria-label="Contrasena"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          [attr.aria-label]="hidePassword ? 'Mostrar contrasena' : 'Ocultar contrasena'"
          [attr.aria-pressed]="!hidePassword"
          (click)="togglePasswordVisibility()"
        >
          <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
        <mat-error *ngIf="shouldShowError(passwordControl)">
          {{ getPasswordErrorMessage() }}
        </mat-error>
      </mat-form-field>

      <p *ngIf="loginError" class="login-form__error" role="alert">
        {{ loginError }}
      </p>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="login-form__submit"
        [disabled]="loginForm.invalid || isLoading"
      >
        <span>{{ isLoading ? 'Ingresando...' : 'Iniciar sesion' }}</span>
        <mat-progress-spinner
          *ngIf="isLoading"
          class="login-form__spinner"
          mode="indeterminate"
          diameter="18"
          strokeWidth="3"
          aria-hidden="true"
        ></mat-progress-spinner>
      </button>
    </form>
  </mat-card>
</section>
