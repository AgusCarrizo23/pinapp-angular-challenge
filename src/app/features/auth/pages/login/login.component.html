<section class="login-page" aria-labelledby="login-title">
  <div class="login-page__content">
    <header class="login-brand" aria-label="PinApp Challenge">
      <span class="login-brand__mark" aria-hidden="true">
        <mat-icon>grid_view</mat-icon>
      </span>
      <span class="login-brand__name">PinApp Challenge</span>
    </header>

    <mat-card class="login-card">
      <div class="login-card__icon" aria-hidden="true">
        <mat-icon>lock</mat-icon>
      </div>

      <div class="login-card__header">
        <h1 id="login-title" class="login-card__title">¡Bienvenido!</h1>
        <p class="login-card__subtitle">Iniciá sesión para continuar</p>
      </div>

      <form
        class="login-form"
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
        novalidate
      >
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix aria-hidden="true">email</mat-icon>
          <input
            matInput
            type="email"
            formControlName="email"
            autocomplete="email"
            aria-label="Email"
          />
          <mat-error *ngIf="shouldShowError(emailControl)">
            {{ getEmailErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <mat-icon matPrefix aria-hidden="true">lock</mat-icon>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
            aria-label="Contraseña"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
            [attr.aria-pressed]="!hidePassword"
            (click)="togglePasswordVisibility()"
          >
            <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="shouldShowError(passwordControl)">
            {{ getPasswordErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <p *ngIf="loginError" class="login-form__error" role="alert">
          <mat-icon aria-hidden="true">error_outline</mat-icon>
          <span>{{ loginError }}</span>
        </p>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="login-form__submit"
          [disabled]="loginForm.invalid || isLoading"
        >
          <span>{{ isLoading ? 'Ingresando...' : 'Iniciar sesión' }}</span>
          <mat-progress-spinner
            *ngIf="isLoading"
            class="login-form__spinner"
            mode="indeterminate"
            diameter="18"
            strokeWidth="3"
            aria-hidden="true"
          ></mat-progress-spinner>
        </button>
      </form>
    </mat-card>
  </div>
</section>
